<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chess — Full Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IBM+Plex+Mono:wght@400;600&family=Sarabun:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: #2a2a35;
  --text: #e8e6e0;
  --muted: #6b6b7a;
  --accent: #c9a84c;
  --accent2: #8b5e3c;
  --light-sq: #e8d9b5;
  --dark-sq: #8b6f47;
  --highlight: rgba(201,168,76,0.45);
  --legal: rgba(201,168,76,0.25);
  --check: rgba(220,50,50,0.55);
  --last-move: rgba(100,180,100,0.35);
  --white-piece: #f5f0e8;
  --black-piece: #1a1a1a;
}

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* noise texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

header {
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative; z-index: 1;
  background: linear-gradient(to right, rgba(201,168,76,0.06), transparent);
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  letter-spacing: 0.12em;
  color: var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.logo span { font-size: 28px; }

.api-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid; cursor: pointer;
  transition: all 0.2s;
}
.api-ok  { border-color: #3d8b5a; color: #6dba8e; background: rgba(61,139,90,0.1); }
.api-err { border-color: #8b3d3d; color: #ba6d6d; background: rgba(139,61,61,0.1); }

/* ─── Layout ─────────────────────────────── */
main {
  flex: 1; display: flex; gap: 0;
  position: relative; z-index: 1;
}

.sidebar {
  width: 260px; min-width: 220px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--surface);
}
.sidebar-right {
  width: 280px; min-width: 240px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--surface);
}

.panel {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em;
  color: var(--muted); margin-bottom: 10px;
  text-transform: uppercase;
}

/* ─── Board area ─────────────────────────── */
.board-area {
  flex: 1; display: flex;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 16px; gap: 8px;
}

.player-bar {
  display: flex; align-items: center; gap: 10px;
  width: 100%; max-width: 520px;
  padding: 8px 12px;
  background: var(--surface2);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.player-bar.active-turn { border-color: var(--accent); }
.player-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); }
.player-dot.white { background: #f5f0e8; }
.player-dot.black { background: #1a1a1a; box-shadow: 0 0 0 1px #555; }
.player-name { font-family: 'Cinzel', serif; font-size: 13px; flex: 1; }
.captured-pieces { font-size: 14px; letter-spacing: -2px; }

/* ─── Chess Board ─────────────────────────── */
.board-frame {
  border: 3px solid var(--border);
  border-radius: 4px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.15);
  overflow: hidden;
  position: relative;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: min(560px, calc(100vw - 580px));
  aspect-ratio: 1;
}

.sq {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: filter 0.12s;
  font-size: clamp(22px, 4.5vw, 46px);
  user-select: none;
}
.sq-light { background: var(--light-sq); }
.sq-dark  { background: var(--dark-sq); }
.sq:hover { filter: brightness(1.12); }
.sq.selected   { background: var(--highlight) !important; }
.sq.legal-move::after {
  content: '';
  position: absolute;
  width: 28%; height: 28%;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  pointer-events: none;
}
.sq.legal-capture::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  box-shadow: inset 0 0 0 4px rgba(0,0,0,0.25);
  pointer-events: none;
}
.sq.in-check   { background: var(--check) !important; }
.sq.last-from, .sq.last-to { background: var(--last-move) !important; }

.coord {
  position: absolute;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; font-weight: 600;
  opacity: 0.55; line-height: 1; pointer-events: none;
}
.coord-rank { top: 2px; left: 3px; }
.coord-file { bottom: 2px; right: 3px; }

/* ─── Status banner ─────────────────────────── */
#statusBanner {
  width: 100%; max-width: 520px;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 13px; letter-spacing: 0.06em;
  padding: 6px 12px;
  border-radius: 4px;
  transition: all 0.3s;
}
.status-ongoing { background: transparent; color: var(--muted); border: 1px solid transparent; }
.status-check   { background: rgba(220,80,80,0.15); color: #e88; border: 1px solid rgba(220,80,80,0.3); }
.status-end     { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }

/* ─── Buttons ─────────────────────────────── */
.btn {
  width: 100%; padding: 9px 16px;
  border-radius: 5px; border: 1px solid;
  font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; display: flex;
  align-items: center; justify-content: center; gap: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, #b8942e, #c9a84c);
  border-color: #c9a84c; color: #1a1200;
}
.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:disabled { background: #2a2a2a; border-color: #333; color: #555; cursor: not-allowed; filter: none; }
.btn-ghost {
  background: transparent; border-color: var(--border); color: var(--muted);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }

/* ─── Move history ─────────────────────────── */
#moveList {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 2px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
}
.move-pair { display: flex; gap: 4px; align-items: center; }
.move-num { color: var(--muted); min-width: 24px; }
.move-uci {
  padding: 2px 8px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); flex: 1; cursor: default;
}
.move-uci.active { border-color: var(--accent); color: var(--accent); }

/* ─── Eval bar ─────────────────────────────── */
.eval-bar-wrap {
  display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.eval-bar {
  flex: 1; height: 10px; border-radius: 5px;
  background: var(--black-piece);
  overflow: hidden; border: 1px solid var(--border);
}
.eval-fill {
  height: 100%; background: var(--white-piece);
  transition: width 0.4s ease;
}
.eval-score {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--muted); min-width: 40px; text-align: right;
}

/* ─── Depth selector ─────────────────────────── */
.depth-row {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.depth-btn {
  padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer;
  transition: all 0.15s;
}
.depth-btn:hover { border-color: var(--accent); color: var(--text); }
.depth-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.1); }

/* ─── Spinner ─────────────────────────────── */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(26,18,0,0.3);
  border-top-color: #1a1200;
  border-radius: 50%;
  animation: spin 0.6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Promo modal ─────────────────────────── */
#promoModal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
}
#promoModal.show { display: flex; }
.promo-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 24px;
  display: flex; gap: 12px;
}
.promo-piece {
  width: 64px; height: 64px; border-radius: 8px;
  background: var(--surface2); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; cursor: pointer; transition: all 0.15s;
}
.promo-piece:hover { border-color: var(--accent); background: rgba(201,168,76,0.1); }

/* ─── Scrollbar ─────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Animations ─────────────────────────── */
@keyframes fadeSlide { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeSlide 0.3s ease; }

/* Responsive */
@media (max-width: 900px) {
  main { flex-direction: column; }
  .sidebar, .sidebar-right { width: 100%; border: none; border-bottom: 1px solid var(--border); }
  #board { width: min(480px, 95vw); }
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>♟</span> CHESS ENGINE</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);" id="turnLabel">WHITE's turn</span>
    <div class="api-pill api-err" id="apiPill" onclick="pingApi()">⬤ offline</div>
  </div>
</header>

<main>
  <!-- ─── Left sidebar ─── -->
  <aside class="sidebar">
    <div class="panel">
      <div class="panel-title">Game Control</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary" onclick="newGame()">♟ เริ่มเกมใหม่</button>
        <button class="btn btn-ghost" onclick="flipBoard()">⇅ กลับด้านกระดาน</button>
        <button class="btn btn-ghost" onclick="undoMove()">↩ ถอนการเดิน</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">AI Engine</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">ความลึก (Depth)</div>
          <div class="depth-row" id="depthBtns">
            <button class="depth-btn" data-d="1">1</button>
            <button class="depth-btn active" data-d="3">3</button>
            <button class="depth-btn" data-d="4">4</button>
            <button class="depth-btn" data-d="5">5 ⚡</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">AI เล่นเป็น</div>
          <div style="display:flex;gap:6px;">
            <button class="depth-btn" id="aiBlackBtn" onclick="setAiSide('black')" style="flex:1;">⬛ ดำ</button>
            <button class="depth-btn active" id="aiNoneBtn" onclick="setAiSide('none')" style="flex:1;">👤 ผู้เล่น</button>
            <button class="depth-btn" id="aiWhiteBtn" onclick="setAiSide('white')" style="flex:1;">⬜ ขาว</button>
          </div>
        </div>
        <button class="btn btn-primary" id="bestMoveBtn" onclick="requestBestMove()">🤖 หา Best Move</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">API Endpoint</div>
      <input id="apiInput" type="text" value="http://localhost:5000"
        style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--muted);
               font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:4px;outline:none;" />
      <button class="btn btn-ghost" style="margin-top:6px;font-size:12px;" onclick="pingApi()">Ping</button>
    </div>

    <div class="panel" style="flex:1;">
      <div class="panel-title">FEN</div>
      <textarea id="fenInput" rows="3"
        style="width:100%;resize:none;background:var(--bg);border:1px solid var(--border);
               color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:9px;
               padding:6px 8px;border-radius:4px;outline:none;"></textarea>
      <button class="btn btn-ghost" style="margin-top:6px;font-size:12px;" onclick="loadFen()">โหลด FEN</button>
    </div>
  </aside>

  <!-- ─── Center board ─── -->
  <section class="board-area">
    <!-- Black player bar -->
    <div class="player-bar" id="barBlack">
      <div class="player-dot black"></div>
      <span class="player-name">Black</span>
      <span class="captured-pieces" id="capturedByBlack"></span>
    </div>

    <div class="board-frame">
      <div id="board"></div>
    </div>

    <div id="statusBanner" class="status-ongoing">กำลังเล่น…</div>

    <!-- White player bar -->
    <div class="player-bar" id="barWhite">
      <div class="player-dot white"></div>
      <span class="player-name">White</span>
      <span class="captured-pieces" id="capturedByWhite"></span>
    </div>
  </section>

  <!-- ─── Right sidebar ─── -->
  <aside class="sidebar-right">
    <div class="eval-bar-wrap">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);">EVAL</div>
      <div class="eval-bar">
        <div class="eval-fill" id="evalFill" style="width:50%;"></div>
      </div>
      <div class="eval-score" id="evalScore">0.0</div>
    </div>

    <div class="panel">
      <div class="panel-title">Move History</div>
    </div>
    <div id="moveList"></div>
  </aside>
</main>

<!-- Promotion modal -->
<div id="promoModal">
  <div class="promo-box">
    <div class="promo-piece" onclick="confirmPromo('q')">♛</div>
    <div class="promo-piece" onclick="confirmPromo('r')">♜</div>
    <div class="promo-piece" onclick="confirmPromo('b')">♝</div>
    <div class="promo-piece" onclick="confirmPromo('n')">♞</div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let fen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
let legalMoves = [];
let selected = null;
let lastMove = null;
let flipped = false;
let history = []; // [{uci, fen}]
let aiSide = 'none'; // 'white' | 'black' | 'none'
let aiDepth = 3;
let pendingPromo = null; // {from, to}
let inCheck = false;
let attackerSquares = [];
let turn = 'white';
let gameOver = false;
let evalScore = 0;
let capturedPieces = { white: [], black: [] }; // captured by each side

const PIECE_ICONS = {
  'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
  'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟',
};

// ─── API ────────────────────────────────────────────────────────────────────
function base() { return document.getElementById('apiInput').value.replace(/\/$/, ''); }

async function apiCall(path, body) {
  const res = await fetch(base() + path, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body), signal: AbortSignal.timeout(15000),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

async function pingApi() {
  try {
    const r = await fetch(base() + '/health', { signal: AbortSignal.timeout(2000) });
    setApiPill(r.ok);
    if (r.ok) newGame();
  } catch { setApiPill(false); }
}

function setApiPill(ok) {
  const el = document.getElementById('apiPill');
  el.className = 'api-pill ' + (ok ? 'api-ok' : 'api-err');
  el.textContent = ok ? '⬤ online' : '⬤ offline';
}

// ─── Game Flow ───────────────────────────────────────────────────────────────
async function newGame(startFen) {
  try {
    const data = await apiCall('/api/new', startFen ? { fen: startFen } : {});
    applyState(data);
    history = [];
    capturedPieces = { white: [], black: [] };
    renderMoveList();
    updateCaptured();
    setApiPill(true);
  } catch(e) { setApiPill(false); showStatus('ไม่สามารถเชื่อมต่อ API: ' + e.message, 'check'); }
}

async function loadFen() {
  const f = document.getElementById('fenInput').value.trim();
  if (f) await newGame(f);
}

function applyState(data) {
  fen = data.fen;
  legalMoves = data.legal_moves || [];
  turn = data.turn;
  inCheck = data.in_check || false;
  attackerSquares = (data.attackers || []).map(a => rowColToSquare(a.row, a.col));
  gameOver = data.status !== 'ongoing' && data.status !== 'check';
  lastMove = data.last_move || null;
  evalScore = estimateEval(data.board || []);

  document.getElementById('fenInput').value = fen;
  selected = null;

  renderBoard(data.board);
  updateTurnUI();
  updateEvalBar();

  if (data.status === 'checkmate') showStatus('♚ Checkmate! ' + (turn === 'white' ? 'Black' : 'White') + ' wins', 'end');
  else if (data.status === 'stalemate') showStatus('Stalemate — Draw', 'end');
  else if (data.status && data.status.startsWith('draw')) showStatus('Draw — ' + data.status, 'end');
  else if (inCheck) showStatus('⚠ Check!', 'check');
  else showStatus('', 'ongoing');

  // Auto AI move
  if (!gameOver && aiSide === turn) {
    setTimeout(requestBestMove, 300);
  }
}

function rowColToSquare(row, col) {
  // board grid: row 0 = rank 8, col 0 = file a
  const file = 'abcdefgh'[col];
  const rank = 8 - row;
  return file + rank;
}

function uciToSquares(uci) {
  return [uci.slice(0,2), uci.slice(2,4)];
}

// ─── Board Rendering ────────────────────────────────────────────────────────
function renderBoard(grid) {
  const container = document.getElementById('board');
  const size = parseInt(getComputedStyle(container).width) || 480;

  container.innerHTML = '';

  const [lastFrom, lastTo] = lastMove ? uciToSquares(lastMove) : [null, null];
  const selectedMoves = selected ? legalMoves.filter(m => m.startsWith(selected)) : [];
  const legalTos = selectedMoves.map(m => m.slice(2, 4));
  const legalCaptureTos = selectedMoves.filter(m => {
    const sq = m.slice(2, 4);
    if (!grid) return false;
    const [r, c] = squareToRowCol(sq);
    return grid[r] && grid[r][c] !== '.';
  }).map(m => m.slice(2, 4));

  for (let ri = 0; ri < 8; ri++) {
    for (let ci = 0; ci < 8; ci++) {
      const row = flipped ? 7 - ri : ri;
      const col = flipped ? 7 - ci : ci;

      const file = 'abcdefgh'[col];
      const rank = 8 - row;
      const sq = file + String(rank);

      const isLight = (row + col) % 2 === 0;
      const piece = grid ? grid[row][col] : '.';

      const cell = document.createElement('div');
      cell.className = 'sq ' + (isLight ? 'sq-light' : 'sq-dark');
      cell.dataset.sq = sq;

      // Highlights
      if (sq === selected) cell.classList.add('selected');
      if (sq === lastFrom || sq === lastTo) {
        if (sq !== selected) cell.classList.add(sq === lastFrom ? 'last-from' : 'last-to');
      }
      if (inCheck && attackerSquares.includes(sq)) cell.classList.add('in-check');
      if (inCheck && sq === kingSquare()) cell.classList.add('in-check');
      if (legalCaptureTos.includes(sq)) cell.classList.add('legal-capture');
      else if (legalTos.includes(sq)) cell.classList.add('legal-move');

      if (piece !== '.') {
        const icon = document.createElement('span');
        icon.textContent = PIECE_ICONS[piece] || piece;
        icon.style.cssText = `
          text-shadow: ${piece === piece.toUpperCase() ? '0 1px 3px rgba(0,0,0,0.5)' : '0 1px 2px rgba(255,255,255,0.15)'};
          filter: ${piece === piece.toUpperCase() ? 'drop-shadow(0 1px 2px rgba(0,0,0,0.6))' : 'drop-shadow(0 1px 2px rgba(0,0,0,0.8))'};
        `;
        cell.appendChild(icon);
      }

      // Coords
      if (ci === 0) {
        const r = document.createElement('span');
        r.className = 'coord coord-rank';
        r.textContent = rank;
        r.style.color = isLight ? 'var(--dark-sq)' : 'var(--light-sq)';
        cell.appendChild(r);
      }
      if (ri === 7) {
        const f = document.createElement('span');
        f.className = 'coord coord-file';
        f.textContent = file;
        f.style.color = isLight ? 'var(--dark-sq)' : 'var(--light-sq)';
        cell.appendChild(f);
      }

      cell.addEventListener('click', () => onSqClick(sq));
      container.appendChild(cell);
    }
  }
}

function squareToRowCol(sq) {
  const file = sq.charCodeAt(0) - 97; // a=0
  const rank = parseInt(sq[1]);       // 1-8
  return [8 - rank, file];
}

function kingSquare() {
  // Find king square from FEN turn
  const fenBoard = fen.split(' ')[0];
  const rows = fenBoard.split('/');
  const kingChar = turn === 'white' ? 'K' : 'k';
  for (let r = 0; r < 8; r++) {
    let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') { c += parseInt(ch); }
      else { if (ch === kingChar) return 'abcdefgh'[c] + (8 - r); c++; }
    }
  }
  return null;
}

// ─── Interaction ─────────────────────────────────────────────────────────────
async function onSqClick(sq) {
  if (gameOver || (aiSide === turn)) return;

  if (selected) {
    const move = selected + sq;
    // Check if pawn promotion
    const [fr, fc] = squareToRowCol(selected);
    const [tr, tc] = squareToRowCol(sq);
    const isPromotion = legalMoves.some(m => m.startsWith(move) && m.length === 5);

    if (legalMoves.some(m => m.startsWith(move))) {
      if (isPromotion) {
        pendingPromo = { from: selected, to: sq };
        document.getElementById('promoModal').classList.add('show');
        return;
      }
      await applyMove(move);
    } else {
      // Select new piece
      selectSquare(sq);
    }
  } else {
    selectSquare(sq);
  }
}

function selectSquare(sq) {
  const hasMoves = legalMoves.some(m => m.startsWith(sq));
  if (hasMoves) {
    selected = sq;
  } else {
    selected = null;
  }
  // Re-render with selection
  const grid = fenToGrid(fen);
  renderBoard(grid);
}

async function confirmPromo(piece) {
  document.getElementById('promoModal').classList.remove('show');
  if (!pendingPromo) return;
  const move = pendingPromo.from + pendingPromo.to + piece;
  pendingPromo = null;
  await applyMove(move);
}

async function applyMove(uci) {
  try {
    const prevGrid = fenToGrid(fen);
    const [, toSq] = uciToSquares(uci);
    const [tr, tc] = squareToRowCol(toSq);
    const captured = prevGrid[tr][tc];
    if (captured && captured !== '.') {
      if (turn === 'white') capturedPieces.white.push(captured);
      else capturedPieces.black.push(captured);
    }

    const data = await apiCall('/api/move', { fen, move: uci });
    history.push({ uci, fen: data.fen });
    renderMoveList();
    updateCaptured();
    applyState(data);
  } catch(e) {
    showStatus('⚠ ' + e.message, 'check');
  }
}

async function undoMove() {
  if (history.length === 0) return;
  history.pop();
  const prev = history.length > 0 ? history[history.length - 1].fen : 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
  try {
    const data = await apiCall('/api/new', { fen: prev });
    fen = prev;
    legalMoves = data.legal_moves;
    turn = data.turn;
    inCheck = data.in_check;
    attackerSquares = (data.attackers || []).map(a => rowColToSquare(a.row, a.col));
    gameOver = false;
    lastMove = history.length > 0 ? history[history.length - 1].uci : null;
    selected = null;
    document.getElementById('fenInput').value = fen;
    renderBoard(data.board);
    updateTurnUI();
    renderMoveList();
    showStatus('', 'ongoing');
  } catch(e) {}
}

async function requestBestMove() {
  if (gameOver) return;
  const btn = document.getElementById('bestMoveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังคิด…';

  try {
    const data = await apiCall('/api/best-move', { fen, depth: aiDepth });
    history.push({ uci: data.best_move, fen: data.fen });
    renderMoveList();
    applyState(data);
  } catch(e) {
    showStatus('⚠ AI: ' + e.message, 'check');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 หา Best Move';
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fenToGrid(fenStr) {
  const rows = fenStr.split(' ')[0].split('/');
  return rows.map(row => {
    let cells = '';
    for (const ch of row) {
      if (ch >= '1' && ch <= '8') cells += '.'.repeat(parseInt(ch));
      else cells += ch;
    }
    return cells;
  });
}

function flipBoard() {
  flipped = !flipped;
  renderBoard(fenToGrid(fen));
}

function setAiSide(side) {
  aiSide = side;
  ['aiBlackBtn','aiNoneBtn','aiWhiteBtn'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const map = { black:'aiBlackBtn', none:'aiNoneBtn', white:'aiWhiteBtn' };
  document.getElementById(map[side]).classList.add('active');
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg || '–';
  el.className = 'status-' + type;
}

function updateTurnUI() {
  document.getElementById('turnLabel').textContent = turn.toUpperCase() + "'s turn";
  document.getElementById('barWhite').classList.toggle('active-turn', turn === 'white');
  document.getElementById('barBlack').classList.toggle('active-turn', turn === 'black');
}

function renderMoveList() {
  const el = document.getElementById('moveList');
  el.innerHTML = '';
  for (let i = 0; i < history.length; i += 2) {
    const row = document.createElement('div');
    row.className = 'move-pair';
    const num = document.createElement('span');
    num.className = 'move-num';
    num.textContent = (i / 2 + 1) + '.';
    row.appendChild(num);

    const w = document.createElement('span');
    w.className = 'move-uci' + (i === history.length - 1 ? ' active' : '');
    w.textContent = history[i].uci;
    row.appendChild(w);

    if (history[i + 1]) {
      const b = document.createElement('span');
      b.className = 'move-uci' + (i + 1 === history.length - 1 ? ' active' : '');
      b.textContent = history[i + 1].uci;
      row.appendChild(b);
    }

    el.appendChild(row);
  }
  el.scrollTop = el.scrollHeight;
}

function updateCaptured() {
  const pieceOrder = ['q','r','b','n','p'];
  const fmt = (arr) => arr.sort((a,b) => pieceOrder.indexOf(a.toLowerCase()) - pieceOrder.indexOf(b.toLowerCase()))
                          .map(p => PIECE_ICONS[p] || p).join('');
  document.getElementById('capturedByBlack').textContent = fmt(capturedPieces.white);
  document.getElementById('capturedByWhite').textContent = fmt(capturedPieces.black);
}

function estimateEval(grid) {
  if (!grid || !grid.length) return 0;
  const vals = { P:1, N:3, B:3, R:5, Q:9, K:0 };
  let score = 0;
  for (const row of grid) {
    for (const ch of row) {
      if (ch === '.') continue;
      const v = vals[ch.toUpperCase()] || 0;
      score += ch === ch.toUpperCase() ? v : -v;
    }
  }
  return score;
}

function updateEvalBar() {
  const clamped = Math.max(-10, Math.min(10, evalScore));
  const pct = ((clamped + 10) / 20) * 100;
  document.getElementById('evalFill').style.width = pct + '%';
  document.getElementById('evalScore').textContent =
    (evalScore >= 0 ? '+' : '') + evalScore.toFixed(1);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.depth-btn[data-d]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.depth-btn[data-d]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    aiDepth = parseInt(btn.dataset.d);
  });
});

// Load initial empty board, then ping API
renderBoard(fenToGrid('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'));
pingApi();
</script>
